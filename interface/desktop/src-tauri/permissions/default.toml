"$schema" = "../gen/schemas/permission.json"

[default]
description = "Default permissions for the gittorrent desktop app"
permissions = [
  "allow-health-check",
  "allow-repo-list",
  "allow-repo-status",
  "allow-repo-init",
  "allow-repo-clone",
  "allow-repo-pull",
  "allow-repo-push",
  "allow-writer-list",
  "allow-writer-invite",
  "allow-writer-revoke",
  "allow-secrets-list",
  "allow-secrets-add",
  "allow-secrets-get",
  "allow-secrets-remove",
  "allow-secrets-rotate",
  "allow-seed-start",
  "allow-seed-stop",
  "allow-seed-status",
  "allow-settings-get",
  "allow-settings-set",
  "allow-set-log-level",
]

[[permission]]
identifier = "allow-health-check"
description = "Allow the frontend to call health_check"
commands.allow = ["health_check"]

[[permission]]
identifier = "allow-repo-list"
description = "Allow the frontend to call repo_list"
